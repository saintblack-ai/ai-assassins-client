name: Build and Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DEFAULT_BACKEND_URL: "https://archaios-saas-worker.quandrix357.workers.dev"
  FRONTEND_HEALTHCHECK_URL: "https://saintblack-ai.github.io/ai-assassins-client/"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
        run: |
          echo "Required GitHub Actions configuration for a public frontend build:"
          echo "  - VITE_SUPABASE_URL"
          echo "  - VITE_SUPABASE_ANON_KEY"
          echo "Optional backend override used for build + healthcheck:"
          echo "  - VITE_BACKEND_URL"

          if [ -z "${VITE_SUPABASE_URL}" ]; then
            echo "::error::Missing VITE_SUPABASE_URL. Set GitHub Actions variable VITE_SUPABASE_URL."
            exit 1
          fi

          if [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Missing VITE_SUPABASE_ANON_KEY. Set GitHub Actions secret VITE_SUPABASE_ANON_KEY."
            exit 1
          fi

          if [ -z "${VITE_BACKEND_URL}" ]; then
            echo "::warning::VITE_BACKEND_URL GitHub variable is missing. Falling back to ${DEFAULT_BACKEND_URL}."
            export VITE_BACKEND_URL="${DEFAULT_BACKEND_URL}"
          fi

          echo "Build frontend env configuration resolved."
          npm run build

      - name: Upload Pages artifact
        if: github.event_name != 'schedule'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'schedule'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  healthcheck:
    if: always()
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait
        run: |
          sleep 10

      - name: Check frontend
        run: |
          curl --fail https://saintblack-ai.github.io/ai-assassins-client/ || exit 1

      - name: Check backend
        run: |
          curl --fail https://archaios-saas-worker.quandrix357.workers.dev/api/health || exit 1
