name: Build and Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  FRONTEND_HEALTHCHECK_URL: "https://saintblack-ai.github.io/ai-assassins-client/"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Verify build environment
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
        run: |
          missing=0

          if [ -z "${VITE_SUPABASE_URL}" ]; then
            echo "::error::Missing required GitHub Actions variable VITE_SUPABASE_URL."
            missing=1
          fi

          if [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Missing required GitHub Actions secret VITE_SUPABASE_ANON_KEY."
            missing=1
          fi

          if [ -z "${VITE_BACKEND_URL}" ]; then
            echo "::error::Missing required GitHub Actions variable VITE_BACKEND_URL."
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            echo "Required GitHub Pages build configuration is incomplete."
            exit 1
          fi

          echo "Required build configuration is present."

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name != 'schedule'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    if: github.event_name != 'schedule'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  healthcheck:
    if: always()
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait
        run: |
          sleep 15

      - name: Check frontend
        run: |
          curl --fail https://saintblack-ai.github.io/ai-assassins-client/ || exit 1

      - name: Check backend
        run: |
          curl --fail https://archaios-saas-worker.quandrix357.workers.dev/api/health || exit 1
